name: Auto Deploy to Release Server
on:
  workflow_dispatch:  # 手动触发配置
    inputs:
      branch:
        description: '需要部署的分支'
        required: true
        default: 'main'
jobs:

  build:
    name: deploy-release
    runs-on: ubuntu-latest
    steps:
      - name: send telegram message on push
        uses: appleboy/telegram-action@master
        with:
          to: 7771207574
          token: 7577717836:AAErCs0jMCGJaaOODpgamZOTzdVyRzCnyUE
          message: |
            ${{ github.actor }} created commit:
            Commit message: ${{ github.event.commits[0].message }}
            
            Repository: ${{ github.repository }}
            
            See changes: https://github.com/${{ github.repository }}/commit/${{github.sha}}
      - name: deploy to release server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.180.137.15
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            cd /www/wwwroot/multi-backend.2040fc.xyz/multi-backend &&
            git pull --rebase origin main &&
            /www/server/nodejs/v22.21.1/bin/pnpm install &&
            git checkout -f . &&
            npm run build &&
            pm2 reload ecosystem.config.js &&
            pm2 restart multi-backend &&
            pm2 save



name: Auto Deploy to Client Server

# on:
#   push:
#     branches:
#       - main

on:
  workflow_dispatch:  # 手动触发配置
    inputs:
      branch:
        description: '需要部署的分支'
        required: true
        default: 'main'

jobs:
  deploy-client:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to client server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 156.238.254.19
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            cd /www/wwwroot/multi-backend.2040fc.xyz/multi-backend-remote &&
            git pull --rebase origin ${GITHUB_REF##*/} &&
            /www/server/nodejs/v22.21.1/bin/pnpm install &&
            git checkout -f . &&
            npm run build &&
            npm run copy-to-remote